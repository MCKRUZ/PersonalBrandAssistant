services:
  db:
    image: postgres:17-alpine
    container_name: pba-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

  sidecar:
    build:
      context: ../claude-code-sidecar
    container_name: pba-sidecar
    environment:
      PORT: "3001"
      SIDECAR_CONFIG_DIR: /config
      SIDECAR_DATA_DIR: /tmp/sidecar-data
    volumes:
      - ./prompts/sidecar.config.json:/config/sidecar.config.json:ro
      - ./CLAUDE.md:/workspace/CLAUDE.md:ro
      - ./.claude:/workspace/.claude:ro
      - ./prompts:/workspace/prompts:ro
    networks:
      - internal
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/PBA.Api/Dockerfile
    container_name: pba-api
    ports:
      - "5001:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ApiKey: ${API_KEY}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Sidecar__WebSocketUrl: ws://sidecar:3001/ws
      TrendMonitoring__TrendRadarApiUrl: http://trendradar:8000/api
    volumes:
      - logs:/app/logs
    networks:
      - default
      - internal
    restart: unless-stopped

  trendradar:
    image: sansan0/trendradar:0.3.0
    container_name: pba-trendradar
    profiles:
      - trendradar
    volumes:
      - trendradar_data:/data
    networks:
      - internal
    restart: unless-stopped

  web:
    build:
      context: src/PersonalBrandAssistant.Web
      dockerfile: Dockerfile
    container_name: pba-web
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: true

volumes:
  pgdata:
  logs:
  trendradar_data:
