services:
  db:
    image: postgres:17-alpine
    container_name: pba-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

  sidecar:
    build:
      context: ../claude-code-sidecar
    container_name: pba-sidecar
    environment:
      PORT: "3001"
      SIDECAR_CONFIG_DIR: /config
    volumes:
      - ./prompts:/config/prompts:ro
    networks:
      - internal
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/PersonalBrandAssistant.Api/Dockerfile
    container_name: pba-api
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
      sidecar:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ApiKey: ${API_KEY}
      DataProtection__KeyPath: /data-protection-keys
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Sidecar__WebSocketUrl: ws://sidecar:3001/ws
      TrendMonitoring__TrendRadarApiUrl: http://trendradar:8000/api
      TrendMonitoring__FreshRssApiUrl: http://freshrss:80/api
    volumes:
      - dpkeys:/data-protection-keys
      - logs:/app/logs
    networks:
      - default
      - internal
    restart: unless-stopped

  trendradar:
    image: sansan0/trendradar:0.3.0
    container_name: pba-trendradar
    volumes:
      - trendradar_data:/data
    networks:
      - internal
    restart: unless-stopped

  freshrss:
    image: freshrss/freshrss:1.24.3
    container_name: pba-freshrss
    environment:
      CRON_MIN: "*/15"
      TZ: America/New_York
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - freshrss_extensions:/var/www/FreshRSS/extensions
    networks:
      - default
      - internal
    restart: unless-stopped

  web:
    build:
      context: src/PersonalBrandAssistant.Web
      dockerfile: Dockerfile
    container_name: pba-web
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: true

volumes:
  pgdata:
  dpkeys:
  logs:
  trendradar_data:
  freshrss_data:
  freshrss_extensions:
