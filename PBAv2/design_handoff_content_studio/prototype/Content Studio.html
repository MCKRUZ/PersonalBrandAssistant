<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Content Studio — PBAv2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --base:#0e0e10; --card:#141418; --elev:#1a1a20; --hover:#22222a;
  --border:#2c2c36; --disabled:#3a3a46;
  --text:#f0f0f5; --text-2:#8a8a96; --text-3:#5a5a66;
  --accent:#c87156; --accent-soft:#c8715622;
  --headline:'DM Serif Display', Georgia, serif;
  --mono:'JetBrains Mono', monospace;
  --r:12px; --r-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--base); color:var(--text);
  -webkit-font-smoothing:antialiased; overflow:hidden;
}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2c2c36;border-radius:6px;border:2px solid var(--base);}
::-webkit-scrollbar-thumb:hover{background:#3a3a46;}
#root{height:100vh;}

/* ===== layout ===== */
.app{display:grid;grid-template-columns:212px 1fr;height:100vh;background:var(--base);}

/* ===== sidebar ===== */
.app-sidebar{
  display:flex;flex-direction:column;background:#0b0b0d;
  border-right:1px solid var(--border);padding:18px 0 14px;
}
.brand{
  font-family:var(--headline);font-size:24px;line-height:1;
  padding:6px 22px 22px;letter-spacing:.3px;color:var(--text);
}
.brand span{color:var(--accent);font-style:italic;}
.app-sidebar nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;flex:1;}
.nav-item{
  display:flex;align-items:center;gap:13px;padding:9px 12px;border-radius:var(--r-sm);
  color:var(--text-2);text-decoration:none;font-size:14px;font-weight:500;cursor:pointer;
  transition:background .14s,color .14s;
}
.nav-item:hover{color:var(--text);background:var(--hover);}
.nav-item.active{color:var(--text);background:var(--accent-soft);}
.nav-item.active .nav-icon{color:var(--accent);}
.nav-icon{font-size:16px;width:18px;text-align:center;}
.sidebar-foot{display:flex;align-items:center;gap:10px;padding:12px 18px 2px;margin-top:8px;border-top:1px solid var(--border);}
.sidebar-foot{padding-top:14px;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#9c5440);
  display:grid;place-items:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.who{min-width:0;line-height:1.3;}
.who-name{font-size:13px;font-weight:600;white-space:nowrap;}
.who-sub{font-size:11px;color:var(--text-3);white-space:nowrap;}

/* ===== studio main ===== */
.studio{display:flex;flex-direction:column;min-width:0;height:100vh;}
.studio-header{padding:22px 28px 0;flex-shrink:0;}
.sh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
.sh-titles h1{font-family:var(--headline);font-size:30px;font-weight:400;line-height:1.1;letter-spacing:.2px;}
.sh-titles p{color:var(--text-2);font-size:13.5px;margin-top:5px;}
.sh-controls{display:flex;align-items:center;gap:12px;margin-top:18px;}
.search{position:relative;flex:1;max-width:420px;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:15px;}
.search input{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px 10px 36px;outline:none;transition:border .14s;
}
.search input::placeholder{color:var(--text-3);}
.search input:focus{border-color:var(--accent);}
.view-toggle{display:flex;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;gap:2px;}
.view-toggle button{
  display:flex;align-items:center;gap:7px;background:transparent;border:none;color:var(--text-2);
  font-family:inherit;font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;cursor:pointer;transition:.14s;
}
.view-toggle button:hover{color:var(--text);}
.view-toggle button.active{background:var(--elev);color:var(--text);}
.view-toggle .vt-glyph{font-size:14px;}

/* buttons */
.btn-primary{
  display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#1a0f0a;
  border:none;border-radius:var(--r-sm);font-family:inherit;font-size:14px;font-weight:600;
  padding:10px 16px;cursor:pointer;transition:filter .14s,transform .04s;white-space:nowrap;
}
.btn-primary:hover{filter:brightness(1.08);}
.btn-primary:active{transform:translateY(1px);}
.btn-primary.lg{padding:13px 24px;font-size:15px;}
.btn-primary .plus{font-size:17px;line-height:1;margin-top:-1px;}
.btn-ghost{
  background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);
  font-family:inherit;font-size:14px;font-weight:500;padding:10px 16px;cursor:pointer;transition:.14s;
}
.btn-ghost:hover{background:var(--hover);border-color:var(--disabled);}

/* ===== pipeline bar ===== */
.pipeline-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:18px 28px 14px;flex-shrink:0;}
.pl-pill{
  display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);
  color:var(--text-2);font-family:inherit;font-size:13px;font-weight:500;padding:7px 13px;border-radius:99px;cursor:pointer;transition:.14s;
}
.pl-pill:hover{background:var(--hover);color:var(--text);}
.pl-pill.on{background:var(--elev);color:var(--text);border-color:var(--disabled);}
.pl-pill.empty{opacity:.5;}
.pl-pill.pl-all.on{border-color:var(--accent);color:var(--text);}
.pl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pl-count{font-family:var(--mono);font-size:11.5px;color:var(--text-3);background:var(--base);padding:1px 7px;border-radius:99px;}
.pl-pill.on .pl-count{color:var(--text-2);}
.pl-divider{width:1px;height:20px;background:var(--border);margin:0 4px;}

/* ===== scroll region ===== */
.studio-scroll{flex:1;min-height:0;overflow:auto;padding:6px 28px 28px;}

/* ===== board ===== */
.board{display:flex;gap:14px;align-items:flex-start;min-height:100%;}
.col{
  flex:0 0 286px;width:286px;background:#0c0c0e;border:1px solid var(--border);border-radius:var(--r);
  display:flex;flex-direction:column;max-height:100%;transition:border-color .14s,background .14s;
}
.col-over{border-color:var(--accent);background:var(--accent-soft);}
.col-head{display:flex;align-items:center;gap:9px;padding:14px 14px 11px;position:sticky;top:0;}
.col-dot{width:9px;height:9px;border-radius:50%;}
.col-name{font-size:13px;font-weight:600;letter-spacing:.2px;}
.col-count{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--text-3);background:var(--card);padding:2px 8px;border-radius:99px;}
.col-body{display:flex;flex-direction:column;gap:10px;padding:0 11px 13px;overflow-y:auto;}
.col-empty{
  border:1px dashed var(--border);border-radius:var(--r-sm);color:var(--text-3);
  font-size:12.5px;text-align:center;padding:18px;
}
.col-over .col-empty{border-color:var(--accent);color:var(--accent);}

/* ===== card ===== */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px;
  cursor:pointer;transition:border-color .14s,transform .06s,box-shadow .14s;
}
.card:hover{border-color:var(--disabled);box-shadow:0 6px 20px -10px rgba(0,0,0,.6);}
.card.dragging{opacity:.4;}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.type-glyph{font-size:14px;color:var(--accent);line-height:1;}
.type-glyph.sm{font-size:12px;margin-right:6px;}
.type-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.card-spacer{flex:1;}
.card-title{font-size:14.5px;font-weight:600;line-height:1.32;color:var(--text);text-wrap:pretty;}
.tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.tag{font-family:var(--mono);font-size:10.5px;color:var(--text-2);background:var(--base);border:1px solid var(--border);padding:2px 8px;border-radius:99px;}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;}
.updated{font-family:var(--mono);font-size:11px;color:var(--text-3);white-space:nowrap;}

/* platform dots */
.prow{display:flex;align-items:center;gap:5px;}
.pdot{
  display:grid;place-items:center;border:1px solid;border-radius:6px;
  font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.3px;
}
.pdot-more{color:var(--text-3);border-color:var(--border);width:22px;height:22px;}

/* voice score ring */
.vscore{border-radius:50%;display:grid;place-items:center;flex-shrink:0;}
.vscore-inner{background:var(--card);width:calc(100% - 5px);height:calc(100% - 5px);border-radius:50%;
  display:grid;place-items:center;font-family:var(--mono);font-size:10.5px;font-weight:500;}
.vscore-empty{border:1.5px dashed var(--border);color:var(--text-3);font-size:13px;}

/* status tag */
.status-tag{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;white-space:nowrap;}
.status-dot{width:8px;height:8px;border-radius:50%;}

/* ===== table ===== */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.ctable{width:100%;border-collapse:collapse;}
.ctable thead th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3);
  font-weight:600;padding:13px 18px;border-bottom:1px solid var(--border);background:#0c0c0e;
}
.ctable th.ta-r,.ctable td.ta-r{text-align:right;}
.ctable tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.ctable tbody tr:last-child{border-bottom:none;}
.ctable tbody tr:hover{background:var(--hover);}
.ctable td{padding:14px 18px;font-size:13.5px;vertical-align:middle;}
.td-title{font-weight:600;max-width:440px;}
.td-tags{display:block;font-family:var(--mono);font-size:11px;color:var(--text-3);font-weight:400;margin-top:3px;}
.td-type{color:var(--text-2);white-space:nowrap;}
.td-updated{font-family:var(--mono);font-size:12px;color:var(--text-3);}

/* ===== empty state ===== */
.empty{max-width:720px;margin:42px auto 0;text-align:center;display:flex;flex-direction:column;align-items:center;}
.empty-mark{
  width:64px;height:64px;border-radius:18px;display:grid;place-items:center;font-size:28px;color:var(--accent);
  background:var(--accent-soft);border:1px solid var(--accent);margin-bottom:22px;
}
.empty-h{font-family:var(--headline);font-size:34px;font-weight:400;line-height:1.1;}
.empty-p{color:var(--text-2);font-size:15px;line-height:1.55;margin-top:12px;max-width:520px;text-wrap:pretty;}
.idea-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:30px;width:100%;}
.idea-card{
  display:flex;flex-direction:column;gap:7px;text-align:left;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 17px;cursor:pointer;transition:.14s;font-family:inherit;
}
.idea-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.idea-topic{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent);font-weight:600;}
.idea-hook{font-size:14.5px;font-weight:500;color:var(--text);line-height:1.4;text-wrap:pretty;}
.idea-cta{display:inline-flex;align-items:center;font-size:12.5px;color:var(--text-2);margin-top:3px;font-weight:500;}
.empty-or{display:flex;align-items:center;width:100%;color:var(--text-3);font-size:12px;margin:26px 0 18px;}
.empty-or::before,.empty-or::after{content:"";flex:1;height:1px;background:var(--border);}
.empty-or span{padding:0 14px;}

/* ===== detail drawer ===== */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;animation:fade .2s ease;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;background:var(--card);
  border-left:1px solid var(--border);z-index:50;display:flex;flex-direction:column;
  animation:slidein .26s cubic-bezier(.2,.8,.2,1);box-shadow:-20px 0 60px -20px rgba(0,0,0,.7);
}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);}
.x{background:transparent;border:none;color:var(--text-3);font-size:15px;cursor:pointer;width:30px;height:30px;border-radius:7px;transition:.14s;}
.x:hover{background:var(--hover);color:var(--text);}
.drawer-body{flex:1;overflow-y:auto;padding:22px 20px;}
.type-label.big{display:inline-flex;align-items:center;font-size:12px;}
.type-label.big .type-glyph{color:var(--accent);}
.drawer-title{font-family:var(--headline);font-size:23px;font-weight:400;line-height:1.18;margin:10px 0 20px;text-wrap:pretty;}
.drawer-meta{display:flex;flex-direction:column;gap:1px;border-top:1px solid var(--border);}
.dm-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.dm-k{width:96px;flex-shrink:0;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);font-weight:600;}
.dm-v{font-size:14px;}
.dm-v.dim{font-family:var(--mono);font-size:12.5px;color:var(--text-2);}
.dd{margin-top:22px;}
.dd-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);font-weight:600;margin-bottom:8px;}
.dd-note{font-size:12.5px;color:var(--text-2);line-height:1.5;margin-bottom:12px;}
.dd-note b{color:var(--text);}
.dd-list{display:flex;flex-direction:column;gap:6px;}
.dd-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--base);border:1px solid var(--border);border-radius:9px;}
.dd-row .dest-dot{width:26px;height:26px;font-size:10px;}
.dd-name{font-size:13.5px;font-weight:500;flex:1;}
.dd-badge{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:99px;white-space:nowrap;}
.dd-badge.a{background:#1f3a2b;color:#4ade80;}
.dd-badge.m{background:#3a2f1c;color:#fbbf24;}
.dd-badge.w{background:#3a2420;color:#f0935f;}
.drawer-preview{margin-top:22px;padding:18px;background:var(--base);border:1px solid var(--border);border-radius:var(--r);}
.dp-line{height:9px;border-radius:4px;background:linear-gradient(90deg,#22222a,#1a1a20);margin-bottom:11px;}
.dp-line.dp-gap{margin-top:18px;}
.dp-note{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:14px;}
.drawer-foot{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);}
.drawer-foot .btn-ghost{flex:1;}
.drawer-foot .btn-primary{flex:1;justify-content:center;}

/* ===== flash toast ===== */
.flash{
  position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
  background:var(--elev);border:1px solid var(--border);color:var(--text);padding:11px 18px;
  border-radius:99px;font-size:13.5px;font-weight:500;z-index:80;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;box-shadow:0 12px 40px -12px rgba(0,0,0,.7);
}
.flash.on{opacity:1;transform:translateX(-50%) translateY(0);}

.avatar.sm{width:24px;height:24px;font-size:10px;}

/* ===== editor screen ===== */
.editor-screen{display:flex;flex-direction:column;height:100vh;min-width:0;}
.ed-top{display:flex;align-items:center;gap:16px;padding:0 22px;height:58px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ed-back{background:transparent;border:none;color:var(--text-2);font-family:inherit;font-size:13.5px;font-weight:500;cursor:pointer;padding:6px 10px;border-radius:7px;}
.ed-back:hover{background:var(--hover);color:var(--text);}
.ed-stage{display:flex;align-items:center;gap:0;}
.ed-stage-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);background:var(--base);}
.ed-stage-dot.on{background:var(--text-3);border-color:var(--text-3);}
.ed-stage-dot.cur{width:12px;height:12px;}
.ed-stage-line{width:18px;height:1.5px;background:var(--border);}
.ed-stage-line.on{background:var(--text-3);}
.ed-stage-label{font-size:12.5px;font-weight:600;margin-left:10px;}
.ed-top-right{margin-left:auto;display:flex;align-items:center;gap:14px;}
.ed-meta{font-size:12.5px;color:var(--text-2);display:flex;align-items:center;}
.ed-meta .type-glyph{color:var(--accent);}
.ed-save{font-size:12px;color:var(--text-3);font-family:var(--mono);}
.btn-ghost.sm{padding:6px 12px;font-size:13px;}
.ed-body{flex:1;min-height:0;display:flex;}
.ed-scroll{flex:1;overflow-y:auto;}
.manuscript{max-width:680px;margin:0 auto;padding:46px 32px 120px;}
.ms-tags{display:flex;gap:6px;margin-bottom:18px;}
.ms-title{font-family:var(--headline);font-size:40px;line-height:1.12;font-weight:400;outline:none;text-wrap:pretty;}
.ms-title:focus,.ms-sub:focus,.ms-prose:focus{outline:none;}
.ms-sub{font-size:19px;line-height:1.45;color:var(--text-2);margin-top:14px;font-weight:400;text-wrap:pretty;}
.ms-byline{display:flex;align-items:center;gap:9px;margin:22px 0 30px;font-size:13px;color:var(--text-3);padding-bottom:24px;border-bottom:1px solid var(--border);}
.ms-prose{font-size:17.5px;line-height:1.75;color:#dcdce2;}
.ms-prose h2{font-family:var(--headline);font-size:25px;font-weight:400;margin:34px 0 12px;color:var(--text);line-height:1.2;}
.ms-prose p{margin-bottom:22px;text-wrap:pretty;}
.ms-idea{text-align:center;padding:48px 20px;border:1px dashed var(--border);border-radius:var(--r);background:#0c0c0e;}
.ms-idea-mark{font-size:24px;color:var(--accent);margin-bottom:14px;}
.ms-idea-h{font-family:var(--headline);font-size:22px;}
.ms-idea-p{color:var(--text-2);font-size:14.5px;line-height:1.6;margin-top:10px;max-width:380px;margin-inline:auto;}
.ms-idea-p b{color:var(--text);}
.ed-side{width:340px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;background:#0c0c0e;}
.ed-side-voice{padding:16px 18px;border-bottom:1px solid var(--border);}
.vmeter-top{display:flex;justify-content:space-between;align-items:baseline;}
.vmeter-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);font-weight:600;}
.vmeter-val{font-family:var(--mono);font-size:18px;font-weight:500;}
.vmeter-track{height:6px;background:var(--border);border-radius:99px;margin:9px 0 8px;overflow:hidden;}
.vmeter-fill{height:100%;border-radius:99px;transition:width .4s ease,background .4s;}
.vmeter-note{font-size:12px;color:var(--text-2);line-height:1.45;}
.ai-sidecar{flex:1;display:flex;flex-direction:column;min-height:0;}
.ai-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;}
.ai-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;}
.ai-spark{color:var(--accent);}
.ai-msgs{flex:1;overflow-y:auto;padding:6px 16px;display:flex;flex-direction:column;gap:12px;}
.ai-msg{display:flex;flex-direction:column;max-width:100%;}
.ai-msg.user{align-items:flex-end;}
.ai-bubble{font-size:13.5px;line-height:1.5;padding:9px 13px;border-radius:13px;max-width:88%;}
.ai-msg.user .ai-bubble{background:var(--accent);color:#1a0f0a;border-bottom-right-radius:4px;}
.ai-msg.assistant .ai-bubble{background:var(--elev);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px;}
.ai-think{display:flex;gap:4px;align-items:center;}
.ai-think span{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:blink 1.2s infinite;}
.ai-think span:nth-child(2){animation-delay:.2s;}
.ai-think span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.3;}30%{opacity:1;}}
.ai-actions{display:flex;gap:6px;margin-top:6px;}
.ai-act{background:transparent;border:1px solid var(--border);color:var(--text-2);font-family:inherit;font-size:11.5px;padding:4px 9px;border-radius:7px;cursor:pointer;transition:.14s;}
.ai-act:hover{background:var(--hover);color:var(--text);border-color:var(--disabled);}
.ai-chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;border-top:1px solid var(--border);}
.ai-chip{background:transparent;border:1px solid var(--border);color:var(--accent);font-family:inherit;font-size:12px;padding:5px 11px;border-radius:99px;cursor:pointer;transition:.14s;}
.ai-chip:hover:not(:disabled){background:var(--accent-soft);}
.ai-chip:disabled{opacity:.4;cursor:not-allowed;}
.ai-input{display:flex;align-items:flex-end;gap:8px;padding:10px 16px 16px;}
.ai-input textarea{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13.5px;padding:9px 12px;resize:none;outline:none;max-height:120px;line-height:1.4;}
.ai-input textarea:focus{border-color:var(--accent);}
.ai-send{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#1a0f0a;border:none;font-size:16px;cursor:pointer;flex-shrink:0;}
.ai-send:disabled{opacity:.4;cursor:not-allowed;}
.ed-actions{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:13px 22px;border-top:1px solid var(--border);flex-shrink:0;background:var(--base);}
.ed-actions-left{display:flex;align-items:center;gap:11px;}
.ed-targets-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);font-weight:600;}
.ed-actions-right{display:flex;gap:9px;}

/* ===== publish overlay ===== */
.pub-scrim{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:200;display:flex;align-items:center;justify-content:center;padding:32px;animation:fade .2s ease;}
.pub{background:var(--card);border:1px solid var(--border);border-radius:16px;width:1080px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 90px -30px rgba(0,0,0,.8);animation:popin .24s cubic-bezier(.2,.8,.2,1);}
@keyframes popin{from{transform:scale(.97) translateY(8px);opacity:.4;}to{transform:scale(1) translateY(0);opacity:1;}}
.pub-head{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pub-head h2{font-family:var(--headline);font-size:24px;font-weight:400;}
.pub-sub{font-size:13.5px;color:var(--text-2);margin-top:3px;max-width:560px;}
.pub-grid{flex:1;min-height:0;display:grid;grid-template-columns:340px 1fr;}
.pub-dests{border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.pub-section-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);font-weight:600;padding:2px 2px 4px;}
.pub-section-label.sched{margin-top:12px;}
.dest{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.14s;background:#0c0c0e;}
.dest:hover{border-color:var(--disabled);}
.dest.on{border-color:var(--accent);background:var(--accent-soft);}
.dest.primary{cursor:default;}
.dest input{accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;}
.dest-dot{width:30px;height:30px;border-radius:8px;border:1px solid;display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:500;flex-shrink:0;}
.dest-main{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}
.dest-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px;}
.dest-primary{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;background:var(--accent-soft);color:var(--accent);padding:2px 6px;border-radius:5px;font-weight:700;}
.dest-fmt{font-size:11.5px;color:var(--text-3);line-height:1.3;}
.dest-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.db{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:99px;white-space:nowrap;}
.db-auto{background:#1f3a2b;color:#4ade80;}
.db-manual{background:#3a2f1c;color:#fbbf24;}
.db-warn{background:#3a2420;color:#f0935f;}
.dest-chars{font-family:var(--mono);font-size:10.5px;color:var(--text-3);}
.dest-chars.over{color:#f87171;}
.pub-sched{display:flex;flex-direction:column;gap:8px;}
.sched-opt{font-size:13.5px;color:var(--text);padding:4px 2px;}
.pub-sched input{background:#0c0c0e;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:8px 10px;color-scheme:dark;}
.pub-preview{display:flex;flex-direction:column;min-height:0;background:#08080a;}
.pub-tabs{display:flex;gap:4px;padding:12px 16px 0;flex-wrap:wrap;flex-shrink:0;}
.pub-tab{display:flex;align-items:center;gap:7px;background:transparent;border:1px solid transparent;color:var(--text-2);font-family:inherit;font-size:12.5px;font-weight:500;padding:7px 12px;border-radius:8px 8px 0 0;cursor:pointer;transition:.14s;}
.pub-tab:hover{color:var(--text);}
.pub-tab.on{background:var(--card);color:var(--text);border-color:var(--border);border-bottom-color:var(--card);}
.pub-tab-dot{font-family:var(--mono);font-size:10px;font-weight:600;}
.pub-canvas{flex:1;min-height:0;overflow-y:auto;padding:0 20px 20px;display:flex;flex-direction:column;}
.pub-canvas-cap{font-size:12px;color:var(--text-3);padding:10px 2px 14px;position:sticky;top:0;background:#08080a;z-index:2;}
.pub-canvas-cap b{color:var(--text-2);}
.pub-canvas-inner{flex:1;}
.pv{background:#fff;color:#1a1a1a;border-radius:10px;overflow:hidden;font-family:'DM Sans',sans-serif;}
.pv-hero{height:120px;background:repeating-linear-gradient(135deg,#e8e3dd,#e8e3dd 11px,#ddd6cd 11px,#ddd6cd 22px);}
.pv-blog-body{padding:26px 30px 32px;}

.pv-lede{font-size:17px;color:#555;margin:12px 0;line-height:1.4;}
.pv-byline{display:flex;align-items:center;gap:8px;font-size:13px;color:#777;margin:14px 0 20px;}
.pv-byline .avatar{background:#c87156;}

.pvb-p,.pvm-p,.pvs-p{font-size:15.5px;line-height:1.7;color:#33312e;margin-bottom:15px;}
.pv-medium{padding:30px 36px;max-width:680px;margin:0 auto;}
.pv-medium h1{font-size:30px;font-weight:800;line-height:1.2;letter-spacing:-.3px;color:#191919;font-family:'DM Sans',sans-serif;}

.pvm-spacer{flex:1;}
.pvm-h{font-size:23px;font-weight:700;margin:22px 0 8px;color:#191919;}
.pv-sub{max-width:620px;margin:0 auto;}

.pv-sub-body h1{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.18;color:#16130f;}
.pv-sub-deck{font-size:17px;color:#555;margin:10px 0;line-height:1.4;}
.pvs-h{font-size:21px;font-weight:700;margin:22px 0 8px;color:#191919;}
.pv-sub-foot{margin-top:24px;padding-top:16px;border-top:1px solid #eee;font-size:12px;color:#999;}
.pv-sub-foot u{cursor:pointer;}
.pv-li{background:#f4f2ee;padding:20px;}
.pv-li-card{background:#fff;border-radius:10px;border:1px solid #e3e2df;padding:16px;max-width:540px;margin:0 auto;}

.pv-li-time{font-size:12px;color:#888;}

.pv-li-text{font-size:14px;line-height:1.5;color:#1a1a1a;margin:12px 0;white-space:pre-wrap;}
.pv-li-more{color:#666;cursor:pointer;}
.pv-li-stats{display:flex;justify-content:space-between;font-size:12.5px;color:#666;padding:8px 0;border-bottom:1px solid #eee;}
.pv-li-bar{display:flex;justify-content:space-between;padding-top:8px;font-size:13px;color:#555;font-weight:600;}
.pv-tw{background:#fff;padding:8px 18px;}
.pv-tw-tweet{display:flex;gap:11px;padding:6px 0;}
.pv-tw-rail{display:flex;flex-direction:column;align-items:center;}

.pv-tw-thread{flex:1;width:2px;background:#dde1e3;margin:5px 0;min-height:14px;}

.pv-tw-num{color:#536471;}
.pv-tw-bar{display:flex;gap:48px;color:#536471;font-size:14px;}
.pub-foot{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;border-top:1px solid var(--border);flex-shrink:0;}

.pub-foot-btns{display:flex;gap:10px;}

.res-state{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;}

.res-state.pub{color:var(--text-2);}

.res-btn{background:transparent;border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;padding:5px 10px;border-radius:7px;cursor:pointer;margin-left:6px;}
.res-btn:hover{background:var(--hover);}
.res-spin{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}

/* ===== density ===== */
.density-compact .card{padding:10px;}
